<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Smart Waste Management — Complaint Management">
  <title>SmartWaste — Complaints</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <header class="page-header">
        <div class="page-header-row">
          <div>
            <h1 class="page-title">Complaints</h1>
            <p class="page-subtitle">Track and resolve citizen complaints</p>
          </div>
          <button class="btn btn-primary" onclick="openAddComplaint()">+ File Complaint</button>
        </div>
      </header>
      <div class="page-body">
        <div class="filter-bar">
          <select class="form-select" id="filter-status" onchange="loadComplaints()">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
          </select>
          <select class="form-select" id="filter-category" onchange="loadComplaints()">
            <option value="">All Categories</option>
            <option value="overflow">Overflow</option>
            <option value="missed_collection">Missed Collection</option>
            <option value="damaged_bin">Damaged Bin</option>
            <option value="bad_odour">Bad Odour</option>
            <option value="illegal_dumping">Illegal Dumping</option>
          </select>
        </div>

        <div class="table-card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Bin</th>
                  <th>Category</th>
                  <th>Description</th>
                  <th>Status</th>
                  <th>Filed At</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="complaints-table">
                <tr><td colspan="7"><div class="loading-overlay"><div class="spinner"></div></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Complaint Modal -->
  <div class="modal-backdrop" id="complaint-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="complaint-modal-title">File New Complaint</h3>
        <button class="modal-close" onclick="closeModal('complaint-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="complaint-form">
          <input type="hidden" id="complaint-edit-id">
          <div class="form-row">
            <div class="form-group">
              <label>Bin ID</label>
              <input type="number" class="form-input" id="complaint-bin" required>
            </div>
            <div class="form-group">
              <label>Category</label>
              <select class="form-select" id="complaint-category" required>
                <option value="overflow">Overflow</option>
                <option value="missed_collection">Missed Collection</option>
                <option value="damaged_bin">Damaged Bin</option>
                <option value="bad_odour">Bad Odour</option>
                <option value="illegal_dumping">Illegal Dumping</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea class="form-input" id="complaint-desc" rows="3" required></textarea>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select class="form-select" id="complaint-status">
              <option value="pending">Pending</option>
              <option value="in_progress">In Progress</option>
              <option value="resolved">Resolved</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('complaint-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveComplaint()">Save</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/complaints.js"></script>
</body>
</html>
