<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Smart Waste Management System — Admin Login">
  <title>SmartWaste — Login</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-page">

  <!-- Theme toggle on login page -->
  <div class="login-theme-toggle">
    <button class="theme-toggle" id="login-theme-btn" title="Toggle light/dark theme">
      <span class="icon-sun">☀️</span>
      <span class="icon-moon">🌙</span>
    </button>
  </div>

  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">♻️</div>
      <h1>SmartWaste</h1>
      <p>Management System Dashboard</p>
    </div>

    <div class="login-error" id="login-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-input" placeholder="Enter username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-block" id="login-btn">
        Sign In
      </button>
    </form>

    <p style="text-align:center; margin-top:20px; font-size:0.75rem; color:var(--text-muted);">
      Default credentials: <strong style="color:var(--text-secondary);">admin</strong> / <strong style="color:var(--text-secondary);">admin123</strong>
    </p>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Theme toggle on login page
    document.getElementById('login-theme-btn').addEventListener('click', toggleTheme);

    // If already logged in, redirect to dashboard
    checkAuth().then(admin => {
      if (admin) window.location.href = '/dashboard.html';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errEl.classList.remove('visible');

      try {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        await API.post('/api/auth/login', { username, password });
        window.location.href = '/dashboard.html';
      } catch (err) {
        errEl.textContent = err.message || 'Invalid credentials';
        errEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
