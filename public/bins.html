<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Smart Waste Management — Bin Management">
  <title>SmartWaste — Bins</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <header class="page-header">
        <div class="page-header-row">
          <div>
            <h1 class="page-title">Bin Management</h1>
            <p class="page-subtitle">Monitor and manage all waste bins</p>
          </div>
          <button class="btn btn-primary" onclick="openModal('bin-modal')">+ Add Bin</button>
        </div>
      </header>
      <div class="page-body">
        <div class="filter-bar">
          <select class="form-select" id="filter-zone" onchange="loadBins()">
            <option value="">All Zones</option>
          </select>
          <select class="form-select" id="filter-status" onchange="loadBins()">
            <option value="">All Statuses</option>
            <option value="active">Active</option>
            <option value="maintenance">Maintenance</option>
            <option value="inactive">Inactive</option>
          </select>
          <select class="form-select" id="filter-type" onchange="loadBins()">
            <option value="">All Types</option>
            <option value="general">General</option>
            <option value="recyclable">Recyclable</option>
            <option value="organic">Organic</option>
            <option value="hazardous">Hazardous</option>
          </select>
        </div>

        <div class="table-card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Zone</th>
                  <th>District</th>
                  <th>Type</th>
                  <th>Status</th>
                  <th>Fill Level</th>
                  <th>Temperature</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="bins-table">
                <tr><td colspan="8"><div class="loading-overlay"><div class="spinner"></div></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Bin Modal -->
  <div class="modal-backdrop" id="bin-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="bin-modal-title">Add New Bin</h3>
        <button class="modal-close" onclick="closeModal('bin-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="bin-form">
          <input type="hidden" id="bin-edit-id">
          <div class="form-row">
            <div class="form-group">
              <label>Zone</label>
              <select class="form-select" id="bin-zone" required></select>
            </div>
            <div class="form-group">
              <label>Bin Type</label>
              <select class="form-select" id="bin-type" required>
                <option value="general">General</option>
                <option value="recyclable">Recyclable</option>
                <option value="organic">Organic</option>
                <option value="hazardous">Hazardous</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>District</label>
            <input type="text" class="form-input" id="bin-district" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Latitude</label>
              <input type="number" step="any" class="form-input" id="bin-lat" required>
            </div>
            <div class="form-group">
              <label>Longitude</label>
              <input type="number" step="any" class="form-input" id="bin-lng" required>
            </div>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select class="form-select" id="bin-status">
              <option value="active">Active</option>
              <option value="maintenance">Maintenance</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('bin-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveBin()">Save Bin</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/bins.js"></script>
</body>
</html>
