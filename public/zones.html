<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Smart Waste Management — Zone Management">
  <title>SmartWaste — Zones</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <header class="page-header">
        <div class="page-header-row">
          <div>
            <h1 class="page-title">Zone Management</h1>
            <p class="page-subtitle">Organize waste collection areas</p>
          </div>
          <button class="btn btn-primary" onclick="openAddZone()">+ Add Zone</button>
        </div>
      </header>
      <div class="page-body">
        <div class="fleet-grid" id="zones-grid">
          <div class="loading-overlay"><div class="spinner"></div></div>
        </div>

        <div class="table-card mt-4">
          <div class="table-header">
            <div class="table-title">Zone Details</div>
          </div>
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Zone Name</th>
                  <th>District</th>
                  <th>Type</th>
                  <th>Bins</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="zones-table">
                <tr><td colspan="6"><div class="loading-overlay"><div class="spinner"></div></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Zone Modal -->
  <div class="modal-backdrop" id="zone-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="zone-modal-title">Add Zone</h3>
        <button class="modal-close" onclick="closeModal('zone-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="zone-form">
          <input type="hidden" id="zone-edit-id">
          <div class="form-group">
            <label>Zone Name</label>
            <input type="text" class="form-input" id="zone-name" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>District</label>
              <input type="text" class="form-input" id="zone-district" required>
            </div>
            <div class="form-group">
              <label>Zone Type</label>
              <select class="form-select" id="zone-type" required>
                <option value="residential">Residential</option>
                <option value="commercial">Commercial</option>
                <option value="industrial">Industrial</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('zone-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveZone()">Save</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/zones.js"></script>
</body>
</html>
