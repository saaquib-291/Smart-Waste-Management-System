<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Smart Waste Management — Fleet and Driver Management">
  <title>SmartWaste — Fleet & Drivers</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <header class="page-header">
        <div class="page-header-row">
          <div>
            <h1 class="page-title">Fleet & Drivers</h1>
            <p class="page-subtitle">Manage vehicles and driver assignments</p>
          </div>
        </div>
      </header>
      <div class="page-body">
        <!-- Tabs -->
        <div class="page-tabs">
          <button class="page-tab active" onclick="switchTab('vehicles', this)">🚛 Vehicles</button>
          <button class="page-tab" onclick="switchTab('drivers', this)">👤 Drivers</button>
        </div>

        <!-- Vehicles Section -->
        <div id="vehicles-section">
          <div class="page-header-row mb-4">
            <div></div>
            <button class="btn btn-primary" onclick="openAddVehicle()">+ Add Vehicle</button>
          </div>
          <div class="fleet-grid" id="vehicles-grid">
            <div class="loading-overlay"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Drivers Section -->
        <div id="drivers-section" class="hidden">
          <div class="page-header-row mb-4">
            <div></div>
            <button class="btn btn-primary" onclick="openAddDriver()">+ Add Driver</button>
          </div>
          <div class="table-card">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Contact</th>
                    <th>License No</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="drivers-table">
                  <tr><td colspan="5"><div class="loading-overlay"><div class="spinner"></div></div></td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Vehicle Modal -->
  <div class="modal-backdrop" id="vehicle-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="vehicle-modal-title">Add Vehicle</h3>
        <button class="modal-close" onclick="closeModal('vehicle-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="vehicle-form">
          <input type="hidden" id="vehicle-edit-id">
          <div class="form-row">
            <div class="form-group">
              <label>Type</label>
              <select class="form-select" id="vehicle-type" required>
                <option value="Compactor Truck">Compactor Truck</option>
                <option value="Mini Truck">Mini Truck</option>
                <option value="Tipper Truck">Tipper Truck</option>
                <option value="Auto Rickshaw">Auto Rickshaw</option>
              </select>
            </div>
            <div class="form-group">
              <label>Plate Number</label>
              <input type="text" class="form-input" id="vehicle-plate" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Capacity (tonnes)</label>
              <input type="number" step="0.01" class="form-input" id="vehicle-capacity" required>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select class="form-select" id="vehicle-status">
                <option value="available">Available</option>
                <option value="on_route">On Route</option>
                <option value="maintenance">Maintenance</option>
              </select>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('vehicle-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveVehicle()">Save</button>
      </div>
    </div>
  </div>

  <!-- Driver Modal -->
  <div class="modal-backdrop" id="driver-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="driver-modal-title">Add Driver</h3>
        <button class="modal-close" onclick="closeModal('driver-modal')">✕</button>
      </div>
      <div class="modal-body">
        <form id="driver-form">
          <input type="hidden" id="driver-edit-id">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-input" id="driver-name" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Contact</label>
              <input type="text" class="form-input" id="driver-contact" required>
            </div>
            <div class="form-group">
              <label>License No</label>
              <input type="text" class="form-input" id="driver-license" required>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('driver-modal')">Cancel</button>
        <button class="btn btn-primary" onclick="saveDriver()">Save</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/fleet.js"></script>
</body>
</html>
